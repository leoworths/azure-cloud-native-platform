apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: leoworths@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        gatewayHTTPRoute:
          parentRefs:
          - kind: Gateway
            name: appgw-gateway
            namespace: todo-app
---
# Azure DNS
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: leoworths@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - dns01:
        azureDNS:
          subscriptionID: "${SUBSCRIPTION_ID}"
          resourceGroupName: "${RESOURCE_GROUP}"
          hostedZoneName: "${DNS_ZONE_NAME}"
          managedIdentity:
            clientID: "${USER_ASSIGNED_CLIENT_ID}"
          environment: AzurePublicCloud


---
# Create Certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tls-cert
  namespace: todo-app
spec:
  secretName: tls-secret
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "cloudbasics.info"
  dnsNames:
  - "cloudbasics.info"


---
# Cloudflare DNS
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: leoworths@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - dns01:
        cloudflare:
          email: "leoworths@gmail.com" # optional if using API token
          apiTokenSecretRef:
            name: cloudflare-api-token
            key: api-token
---


