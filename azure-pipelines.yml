trigger:
  branches:
    include:
      - dev
      - main

variables:
  nodeVersion: "22"
  pythonVersion: "3.12"

  acrName: "3tieracr"
  acrLoginServer: "3tieracr.azurecr.io"
  imageRepositoryFrontend: "3tier-azure/frontend"
  imageRepositoryBackend: "3tier-azure/backend"
  acrServiceConnection: "acr-svc-conn"
  tag: "$(Build.SourceVersion)"

#################################################
# STAGE 1 - VALIDATE + SECURITY (FAST)
#################################################
stages:
- stage: Validate
  jobs:
    - job: validate
      pool:
        vmImage: ubuntu-latest

      steps:
        - checkout: self

        # 🔧 Install tools (prevents pipeline failure)
        - script: |
            echo "Installing tools..."

            # Gitleaks
            curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh | bash

            # Trivy
            sudo apt-get update
            sudo apt-get install -y wget apt-transport-https gnupg lsb-release
            wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
            echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee /etc/apt/sources.list.d/trivy.list
            sudo apt-get update
            sudo apt-get install -y trivy

            # Syft
            curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

          displayName: "Install Security Tools"

        - task: NodeTool@0
          inputs:
            versionSpec: $(nodeVersion)

        - task: UsePythonVersion@0
          inputs:
            versionSpec: $(pythonVersion)

        - script: |
            find ./frontend -name "*.js" -exec node --check {} +
            python -m py_compile $(git ls-files '*.py')
          displayName: "Syntax Check"

        - script: |
            gitleaks detect --source . --report-path gitleaks.json || true
          displayName: "Secrets Scan"

#################################################
# STAGE 2 - BUILD
#################################################
- stage: Build
  dependsOn: Validate
  jobs:
    - job: build
      pool:
        vmImage: ubuntu-latest

      steps:
        - checkout: self

        - script: |
            cd frontend && npm ci && npm run build
            cd ../backend && pip install -r requirements.txt
          displayName: "Build Applications"

#################################################
# STAGE 3 - DEV (FAST PATH)
#################################################
- stage: Dev
  dependsOn: Build
  condition: eq(variables['Build.SourceBranch'], 'refs/heads/dev')

  jobs:
    - job: docker_dev
      pool:
        vmImage: ubuntu-latest

      steps:
        - checkout: self

        - task: AzureCLI@2
          inputs:
            azureSubscription: $(acrServiceConnection)
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              az acr login --name $(acrName)

        - script: |
            docker build -t $(acrLoginServer)/$(imageRepositoryFrontend):$(tag) frontend
            docker build -t $(acrLoginServer)/$(imageRepositoryBackend):$(tag) backend

            docker push $(acrLoginServer)/$(imageRepositoryFrontend):$(tag)
            docker push $(acrLoginServer)/$(imageRepositoryBackend):$(tag)
          displayName: "Build & Push (DEV)"

#################################################
# STAGE 4 - PROD (ZERO TRUST)
#################################################
- stage: Prod
  dependsOn: Build
  condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')

  jobs:
    - job: docker_prod
      pool:
        name: devops-pool   # your Terraform pool

      steps:
        - checkout: self

        # 🔐 No secrets, no public access
        - script: |
            az login --identity
            az acr login --name $(acrName)
          displayName: "Managed Identity Login"

        - script: |
            docker build -t $(acrLoginServer)/$(imageRepositoryFrontend):$(tag) frontend
            docker build -t $(acrLoginServer)/$(imageRepositoryBackend):$(tag) backend

            docker push $(acrLoginServer)/$(imageRepositoryFrontend):$(tag)
            docker push $(acrLoginServer)/$(imageRepositoryBackend):$(tag)
          displayName: "Build & Push (PROD)"

#################################################
# STAGE 5 - SECURITY GATE (PROD ONLY)
#################################################
- stage: Security
  dependsOn: Prod
  condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')

  jobs:
    - job: security
      pool:
        vmImage: ubuntu-latest

      steps:
        - script: |
            trivy image \
              --severity CRITICAL,HIGH \
              --exit-code 1 \
              $(acrLoginServer)/$(imageRepositoryBackend):$(tag)
          displayName: "Security Gate"

#################################################
# STAGE 6 - GITOPS (DEPLOYMENT HANDOFF)
#################################################
- stage: GitOps
  dependsOn:
    - Dev
    - Security

  jobs:
    - job: update
      pool:
        vmImage: ubuntu-latest

      steps:
        - checkout: self

        - script: |
            sed -i "s|image: .*frontend.*|image: $(acrLoginServer)/$(imageRepositoryFrontend):$(tag)|g" k8s/frontend.yaml
            sed -i "s|image: .*backend.*|image: $(acrLoginServer)/$(imageRepositoryBackend):$(tag)|g" k8s/backend.yaml

            git config user.email "ci@platform.dev"
            git config user.name "platform-ci"

            git add k8s/
            git commit -m "GitOps update: $(tag)" || echo "No changes"
            git push
          displayName: "Update GitOps"






