name: CI - Build and Security Scan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
env:
  ACR_NAME: 3tieracr
  ACR_LOGIN_SERVER: 3tieracr.azurecr.io
  FRONTEND_IMAGE: 3tier-azure/frontend
  BACKEND_IMAGE: 3tier-azure/backend
  IMAGE_TAG: ${{ github.sha }}

# =========================================================
# VALIDATION
# =========================================================
jobs:
  validate:
    runs-on: arc-runner-set
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================
      # NODE SETUP
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # =========================
      # PYTHON SETUP
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      # =========================
      # INSTALL DEPENDENCIES
      # =========================
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Backend Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # =========================
      # LINT
      # =========================
      - name: Lint Frontend
        run: |
          cd frontend
          npm run lint --if-present

      # =========================
      # SYNTAX VALIDATION
      # =========================
      - name: Syntax Check
        run: |
          find ./frontend -name "*.js" -exec node --check {} +
          python -m py_compile $(git ls-files '*.py')

# =========================================================
# TEST
# =========================================================
  test:
    runs-on: arc-runner-set
    needs: validate
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================
      # BACKEND TESTS
      # =========================
      - name: Run Backend Tests
        run: |
          cd backend
          pip install pytest pytest-cov pytest-html
          pytest \
            --cov=. \
            --junitxml=pytest-report.xml \
            --cov-report=html

      # =========================
      # FRONTEND TESTS
      # =========================
      - name: Run Frontend Tests
        run: |
          cd frontend
          npm ci
          npm test -- --coverage --watchAll=false

      # =========================
      # UPLOAD REPORTS
      # =========================
      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.sha }}
          path: |
            backend/pytest-report.xml
            backend/htmlcov/
            frontend/coverage/lcov-report/

# =========================================================
# STATIC SECURITY SCANS
# =========================================================
  security-static:
    runs-on: arc-runner-set
    needs: test
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================
      # GITLEAKS
      # =========================
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # TRIVY FILESYSTEM SCAN
      # =========================
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif

      # =========================
      # CHECKOV
      # =========================
      - name: Run Checkov Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform,kubernetes,dockerfile,github_actions
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: false

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov.sarif

# =========================================================
# BUILD APPLICATION
# =========================================================
  build:
    runs-on: arc-runner-set
    needs: security-static
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================
      # BUILD FRONTEND
      # =========================
      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

# =========================================================
# CONTAINER BUILD & PUSH
# =========================================================
  container-build:
    runs-on: arc-runner-set
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================
      # AZURE LOGIN (OIDC)
      # =========================
      - name: Azure Login
        uses: azure/login@v4
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # =========================
      # ACR LOGIN
      # =========================
      - name: ACR Login
        run: |
          az acr login --name $ACR_NAME

      # =========================
      # DOCKER BUILDX
      # =========================
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      # =========================
      # BUILD & PUSH FRONTEND
      # =========================
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =========================
      # BUILD & PUSH BACKEND
      # =========================
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

# =========================================================
# CONTAINER SECURITY
# =========================================================
  container-security:
    runs-on: arc-runner-set
    needs: container-build
    permissions:
      security-events: write
      contents: read

    steps:
      # =========================
      # FRONTEND IMAGE SCAN
      # =========================
      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: frontend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      # =========================
      # BACKEND IMAGE SCAN
      # =========================
      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: backend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      # =========================
      # UPLOAD SARIF
      # =========================
      - name: Upload Frontend SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: frontend.sarif

      - name: Upload Backend SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: backend.sarif

      # =========================
      # SECURITY GATE
      # =========================
      - name: Security Gate
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

# =========================================================
# SUPPLY CHAIN SECURITY
# =========================================================
  supply-chain:
    runs-on: arc-runner-set
    needs: container-security
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================
      # INSTALL SYFT
      # =========================
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh

      # =========================
      # GENERATE SBOM
      # =========================
      - name: Generate Backend SBOM
        run: |
          syft \
          $ACR_LOGIN_SERVER/$BACKEND_IMAGE:$IMAGE_TAG \
          -o cyclonedx-json > sbom-backend.json

      - name: Generate Frontend SBOM
        run: |
          syft \
          $ACR_LOGIN_SERVER/$FRONTEND_IMAGE:$IMAGE_TAG \
          -o cyclonedx-json > sbom-frontend.json

      # =========================
      # INSTALL COSIGN
      # =========================
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # =========================
      # SIGN IMAGES
      # =========================
      - name: Sign Backend Image
        run: |
          cosign sign --yes \
          $ACR_LOGIN_SERVER/$BACKEND_IMAGE:$IMAGE_TAG

      - name: Sign Frontend Image
        run: |
          cosign sign --yes \
          $ACR_LOGIN_SERVER/$FRONTEND_IMAGE:$IMAGE_TAG

      # =========================
      # UPLOAD SBOM
      # =========================
      - name: Upload SBOM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: |
            sbom-backend.json
            sbom-frontend.json













