name: CI - Build and Security Scan

on:
  push:
    branches: [main]
    tags:
      - "v*"

  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  id-token: write

env:
  ACR_NAME: 3tieracr
  ACR_LOGIN_SERVER: 3tieracr.azurecr.io
  FRONTEND_IMAGE: 3tier-azure/frontend
  BACKEND_IMAGE: 3tier-azure/backend

# =========================================================
# JOBS
# =========================================================
jobs:

# =========================================================
# VALIDATION
# =========================================================
  validate:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Backend Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax Check
        run: |
          find ./frontend -name "*.js" -exec node --check {} +
          python -m py_compile $(git ls-files '*.py')

# =========================================================
# TEST
# =========================================================
  test:
    runs-on: ubuntu-latest
    needs: validate

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run Backend Tests
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-html

          pytest \
            --cov=. \
            --junitxml=pytest-report.xml \
            --cov-report=html || echo "No backend tests found"

      - name: Run Frontend Tests
        run: |
          cd frontend
          npm ci
          npm test || echo "No frontend tests found"

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.sha }}
          path: |
            backend/pytest-report.xml
            backend/htmlcov/
            frontend/coverage/

# =========================================================
# STATIC SECURITY SCANS
# =========================================================
  security-static:
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy FS SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
      
#       # =========================
#       # CHECKOV
#       # =========================
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform,kubernetes,dockerfile,github_actions
          output_format: cli,sarif
          output_file_path: checkov.sarif
          soft_fail: true
    
      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov.sarif
          category: checkov


# =========================================================
# BUILD APPLICATION
# =========================================================
  build:
    runs-on: ubuntu-latest
    needs: security-static
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
# =========================================================
# BUILD + PUSH CONTAINERS
# =========================================================
  container-build:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    outputs:
      frontend_digest: ${{ steps.frontend_build.outputs.digest }}
      backend_digest: ${{ steps.backend_build.outputs.digest }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name $ACR_NAME

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # =====================================================
      # FRONTEND METADATA
      # =====================================================
      - name: Frontend Docker Metadata
        id: frontend_meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}

          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=ref,event=branch
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      # =====================================================
      # BACKEND METADATA
      # =====================================================
      - name: Backend Docker Metadata
        id: backend_meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}

          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=ref,event=branch
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      # =====================================================
      # BUILD FRONTEND
      # =====================================================
      - name: Build and Push Frontend Image
        id: frontend_build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.frontend_meta.outputs.tags }}
          labels: ${{ steps.frontend_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =====================================================
      # BUILD BACKEND
      # =====================================================
      - name: Build and Push Backend Image
        id: backend_build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.backend_meta.outputs.tags }}
          labels: ${{ steps.backend_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# =========================================================
# CONTAINER SECURITY
# =========================================================
  container-security:
    runs-on: ubuntu-latest
    needs: container-build

    permissions:
      security-events: write
      contents: read
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name $ACR_NAME

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}@${{ needs.container-build.outputs.frontend_digest }}
          format: sarif
          output: frontend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}@${{ needs.container-build.outputs.backend_digest }}
          format: sarif
          output: backend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Frontend SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: frontend.sarif
          category: trivy-frontend

      - name: Upload Backend SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: backend.sarif
          category: trivy-backend

# =========================================================
# SUPPLY CHAIN SECURITY
# =========================================================
  supply-chain:
    runs-on: ubuntu-latest

    needs:
      - container-build
      - container-security

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name $ACR_NAME

      # =====================================================
      # INSTALL SYFT
      # =====================================================
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | \
          sudo sh -s -- -b /usr/local/bin

      # =====================================================
      # INSTALL COSIGN
      # =====================================================
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # =====================================================
      # GENERATE BACKEND SBOM
      # =====================================================
      - name: Generate Backend SBOM
        run: |
          syft \
          $ACR_LOGIN_SERVER/$BACKEND_IMAGE@${{ needs.container-build.outputs.backend_digest }} \
          -o cyclonedx-json > sbom-backend.json

      # =====================================================
      # GENERATE FRONTEND SBOM
      # =====================================================
      - name: Generate Frontend SBOM
        run: |
          syft \
          $ACR_LOGIN_SERVER/$FRONTEND_IMAGE@${{ needs.container-build.outputs.frontend_digest }} \
          -o cyclonedx-json > sbom-frontend.json

      # =====================================================
      # SIGN BACKEND IMAGE
      # =====================================================
      - name: Sign Backend Image
        run: |
          cosign sign --yes \
          $ACR_LOGIN_SERVER/$BACKEND_IMAGE@${{ needs.container-build.outputs.backend_digest }}

      # =====================================================
      # SIGN FRONTEND IMAGE
      # =====================================================
      - name: Sign Frontend Image
        run: |
          cosign sign --yes \
          $ACR_LOGIN_SERVER/$FRONTEND_IMAGE@${{ needs.container-build.outputs.frontend_digest }}

      # =====================================================
      # UPLOAD SBOM
      # =====================================================
      - name: Upload SBOM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: |
            sbom-backend.json
            sbom-frontend.json






