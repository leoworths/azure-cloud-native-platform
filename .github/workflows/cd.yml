name: CD - GitOps Deployment 

on:
    workflow_run:
        workflows: ["CI - Build and Security Scan"]
        types:
            - completed

env: 
  ACR_LOGIN_SERVER: 3tieracr.azurecr.io
  FRONTEND_IMAGE: 3tier-azure/frontend
  BACKEND_IMAGE: 3tier-azure/backend
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      id-token: write
      contents: write   # Needed for GitOps push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
            repository: leoworths/platform-gitops
            token: ${{ secrets.GH_PAT }}
            fetch-depth: 0
      
      # =========================
      # GITOPS UPDATE FOR ARGO CD
      # =========================
      - name: Update Argo CD Application YAML with new image tag
        run: |
          sed -i "s|image: .*backend.*|image: $ACR_LOGIN_SERVER/$BACKEND_IMAGE:$IMAGE_TAG|g" k8s/backend.yaml
          sed -i "s|image: .*frontend.*|image: $ACR_LOGIN_SERVER/$FRONTEND_IMAGE:$IMAGE_TAG|g" k8s/frontend.yaml
      - name: Commit and Push changes to GitOps repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend.yaml k8s/frontend.yaml
          git commit -m "Update image tags to $IMAGE_TAG [skip ci]" || echo "No changes to commit"
          git push 





