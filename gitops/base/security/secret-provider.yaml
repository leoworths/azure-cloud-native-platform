# Service Account with Azure Workload Identity
apiVersion: v1
kind: ServiceAccount
metadata:
  name: todo-sa
  namespace: todo-app
  annotations:
    azure.workload.identity/client-id: cd558ac9-3058-4917-b149-ca09a9567727
  labels:
    azure.workload.identity/use: "true"
---


apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-keyvault
  namespace: todo-app
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: cd558ac9-3058-4917-b149-ca09a9567727
    keyvaultName: platform-yjiwu-kv
    cloudName: "AzurePublicCloud"
    objects: |
      array:
        - |
          objectName: db-user
          objectType: secret
          objectVersion: ""
        - |
          objectName: db-password
          objectType: secret
          objectVersion: ""
        - |
          objectName: db-host
          objectType: secret
          objectVersion: ""
        - |
          objectName: db-name
          objectType: secret
          objectVersion: ""
        - |
          objectName: secret-key
          objectType: secret
          objectVersion: ""
    tenantId: 51abf51d-04ca-4e54-9418-fe1979e43fbb
