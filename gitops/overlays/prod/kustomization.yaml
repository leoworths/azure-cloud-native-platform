apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: todo-app

resources:
- ../../base


patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 3
  target:
    kind: Deployment
    name: backend
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
    name: frontend


images:
- name: backend
  newName: 3tieracr.azurecr.io/3tier-azure/backend
  newTag: sha-ab875a7
- name: frontend
  newName: 3tieracr.azurecr.io/3tier-azure/frontend
  newTag: sha-ab875a7
